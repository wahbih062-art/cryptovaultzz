<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CryptoVault</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --gold: #d4a853;
    --gold-light: #f0d78c;
    --gold-dark: #a37e2c;
    --emerald: #2ecc71;
    --emerald-dark: #1a9c54;
    --bg: #0b0e11;
    --bg2: #111519;
    --bg3: #171c22;
    --card: rgba(255,255,255,0.035);
    --card-border: rgba(212,168,83,0.12);
    --card-hover: rgba(212,168,83,0.08);
    --text: #f0ece4;
    --text2: rgba(240,236,228,0.55);
    --text3: rgba(240,236,228,0.25);
    --danger: #e74c3c;
    --glow: rgba(212,168,83,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
    background:var(--bg);color:var(--text);
    font-family:'DM Sans','Noto Sans Arabic',sans-serif;
    min-height:100vh;overflow-x:hidden;
}
[dir="rtl"]{font-family:'Noto Sans Arabic','DM Sans',sans-serif}
[dir="rtl"] .plan-check{right:auto;left:8px}

/* ===== Canvas Particles ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ===== Mesh Gradient BG ===== */
.mesh-bg{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
        radial-gradient(ellipse 600px 400px at 10% 20%, rgba(212,168,83,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 500px 500px at 80% 70%, rgba(46,204,113,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 400px 300px at 50% 50%, rgba(212,168,83,0.03) 0%, transparent 70%);
}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 15px rgba(212,168,83,0.1)}50%{box-shadow:0 0 30px rgba(212,168,83,0.25)}}
@keyframes scale-in{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
@keyframes slide-right{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow-line{0%{left:-30%}100%{left:130%}}
@keyframes count-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes success-bounce{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.anim-1{animation:fadeUp .6s ease both}
.anim-2{animation:fadeUp .6s .1s ease both}
.anim-3{animation:fadeUp .6s .2s ease both}
.anim-4{animation:fadeUp .6s .3s ease both}
.anim-5{animation:fadeUp .6s .4s ease both}

/* ===== Layout ===== */
.app{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 18px 90px}

/* ===== Header ===== */
.header{display:flex;justify-content:space-between;align-items:center;padding:18px 0 10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
    width:38px;height:38px;border-radius:10px;
    background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display';font-size:18px;font-weight:900;color:#0b0e11;
    box-shadow:0 4px 20px rgba(212,168,83,0.3);
}
.logo-name{font-family:'Playfair Display';font-size:17px;font-weight:700;letter-spacing:-.3px}
.lang-btn{
    background:var(--card);border:1px solid var(--card-border);border-radius:10px;
    padding:7px 14px;color:var(--text);font-size:12px;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:6px;transition:.3s
}
.lang-btn:active{transform:scale(.96)}

/* ===== Hero ===== */
.hero{text-align:center;padding:22px 0 18px}
.hero-badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;
    background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.2);color:var(--emerald);
    margin-bottom:14px;letter-spacing:.3px;
}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:float 2s ease infinite}
.hero h1{
    font-family:'Playfair Display';font-size:30px;font-weight:800;line-height:1.2;
    background:linear-gradient(135deg,var(--text) 0%,var(--gold) 40%,var(--gold-light) 60%,var(--text) 100%);
    background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;animation:shimmer 6s linear infinite;margin-bottom:6px;
}
.hero p{font-size:13px;color:var(--text2);font-weight:300}

/* ===== Live Stats ===== */
.live-stats{
    display:flex;gap:8px;margin-bottom:18px;
    background:var(--card);border:1px solid var(--card-border);border-radius:16px;
    padding:16px 14px;position:relative;overflow:hidden;
}
.live-stats::after{
    content:'';position:absolute;top:0;left:-30%;width:20%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(212,168,83,0.06),transparent);
    animation:glow-line 4s ease infinite;
}
.live-stat{flex:1;text-align:center}
.live-stat-val{font-size:18px;font-weight:700;color:var(--gold);animation:count-up .8s ease both}
.live-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}

/* ===== Bottom Nav ===== */
.bottom-nav{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(11,14,17,0.92);backdrop-filter:blur(20px);
    border-top:1px solid var(--card-border);
    display:flex;padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));
}
.bnav{
    flex:1;background:none;border:none;color:var(--text3);
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 4px;border-radius:10px;cursor:pointer;
    font-family:inherit;transition:.25s;
}
.bnav.active{color:var(--gold);background:var(--glow)}
.bnav:active{transform:scale(.92)}
.bnav-icon{font-size:18px}
.bnav-label{font-size:8px;font-weight:600;white-space:nowrap;letter-spacing:.3px}

/* ===== Cards ===== */
.card{
    background:var(--card);border:1px solid var(--card-border);
    border-radius:16px;backdrop-filter:blur(8px);
    transition:.35s cubic-bezier(.25,.46,.45,.94);margin-bottom:12px;
    position:relative;overflow:hidden;
}
.card::before{
    content:'';position:absolute;inset:0;border-radius:16px;
    background:linear-gradient(135deg,rgba(212,168,83,0.03),transparent 60%);
    pointer-events:none;
}

/* ===== Plans ===== */
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.plan{
    padding:18px 6px;text-align:center;cursor:pointer;position:relative;
    border-radius:14px;transition:.3s;
}
.plan:active{transform:scale(.96)}
.plan.sel{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,83,0.08),rgba(212,168,83,0.02))}
.plan.sel::after{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.plan-amt{font-family:'Playfair Display';font-size:20px;font-weight:800}
.plan-cur{font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px}
.plan-check{
    position:absolute;top:7px;right:7px;width:18px;height:18px;border-radius:50%;
    background:var(--gold);display:none;align-items:center;justify-content:center;
    font-size:10px;color:#0b0e11;font-weight:900;
}
.plan.sel .plan-check{display:flex}

/* ===== Invest Form ===== */
.invest-form{padding:20px}
.profit-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.profit-tag{
    padding:6px 12px;border-radius:10px;font-size:11px;font-weight:600;
    display:flex;align-items:center;gap:5px;
}
.profit-tag.weekly{background:rgba(212,168,83,0.1);color:var(--gold);border:1px solid rgba(212,168,83,0.2)}
.profit-tag.monthly{background:rgba(46,204,113,0.1);color:var(--emerald);border:1px solid rgba(46,204,113,0.2)}
.profit-tag.free{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid rgba(255,255,255,0.06)}

.nets{display:flex;gap:6px;margin-bottom:14px}
.net{
    flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--card-border);
    background:var(--card);cursor:pointer;text-align:center;transition:.3s;font-family:inherit;color:var(--text2);
}
.net.active{border-color:var(--gold);background:var(--glow);color:var(--gold)}
.net:active{transform:scale(.96)}
.net-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.net-name{font-weight:600;font-size:12px;display:block;margin-top:3px}
.net-chain{font-size:9px;color:var(--text3)}

.field-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.field{
    width:100%;background:rgba(255,255,255,0.025);border:1px solid var(--card-border);
    border-radius:11px;padding:13px 14px;color:var(--text);font-size:13px;
    font-family:'DM Sans',monospace;outline:none;transition:.3s;margin-bottom:14px;
}
.field:focus{border-color:var(--gold);box-shadow:0 0 20px var(--glow)}
.field::placeholder{color:var(--text3)}

.btn{
    width:100%;border:none;padding:14px;border-radius:13px;font-size:14px;
    font-weight:700;cursor:pointer;font-family:inherit;transition:.3s;position:relative;overflow:hidden;
}
.btn:active{transform:scale(.98)}
.btn-gold{
    background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0b0e11;
    box-shadow:0 6px 25px rgba(212,168,83,0.3);
}
.btn-gold:hover{box-shadow:0 8px 35px rgba(212,168,83,0.4)}
.btn-outline{background:var(--card);border:1px solid var(--card-border);color:var(--text)}

/* ===== Steps ===== */
.step{display:flex;align-items:flex-start;gap:14px;padding:18px}
.step-n{
    width:40px;height:40px;border-radius:11px;flex-shrink:0;
    background:linear-gradient(135deg,var(--gold),var(--gold-dark));
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display';font-weight:800;font-size:16px;color:#0b0e11;
}
.step-t{font-size:14px;font-weight:600;margin-bottom:3px}
.step-d{font-size:12px;color:var(--text2);line-height:1.5}

/* ===== Referral ===== */
.ref-hero{text-align:center;padding:28px 18px}
.ref-icon{font-size:44px;margin-bottom:12px;animation:float 3s ease infinite;display:inline-block}
.ref-pct{font-family:'Playfair Display';font-size:42px;font-weight:900;color:var(--gold)}
.ref-link-box{display:flex;gap:8px;padding:0 18px 18px}
.ref-link{
    flex:1;background:rgba(255,255,255,0.025);border:1px solid var(--card-border);
    border-radius:10px;padding:11px;color:var(--text);font-size:10px;
    font-family:monospace;outline:none;
}
.copy-btn{
    background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;
    color:#0b0e11;padding:11px 16px;border-radius:10px;font-size:12px;
    font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;
}
.copy-btn:active{transform:scale(.96)}

/* ===== Balance ===== */
.bal-main{text-align:center;padding:24px 18px 16px}
.bal-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
.bal-amt{
    font-family:'Playfair Display';font-size:38px;font-weight:900;
    background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin:4px 0;
}
.bal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 18px 18px}
.bal-item{
    background:rgba(255,255,255,0.02);border-radius:11px;padding:14px;text-align:center;
    border:1px solid rgba(255,255,255,0.03);
}
.bal-item-v{font-size:16px;font-weight:700}
.bal-item-l{font-size:10px;color:var(--text3);margin-top:3px}

/* ===== Withdraw ===== */
.wd-section{padding:20px}
.wd-avail{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;
    background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.15);color:var(--emerald);
    margin-bottom:14px;
}
.wd-free{
    text-align:center;margin-top:12px;font-size:11px;color:var(--emerald);
    padding:8px;border-radius:10px;background:rgba(46,204,113,0.06);
    border:1px solid rgba(46,204,113,0.1);
}

/* ===== Deposit ===== */
.dep-info{padding:22px}
.dep-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.dep-row:last-of-type{border:none}
.dep-k{color:var(--text2);font-size:13px}
.dep-v{font-weight:700;font-size:13px}
.dep-wallet{
    background:rgba(212,168,83,0.06);border:1px solid rgba(212,168,83,0.15);
    border-radius:11px;padding:14px;margin:14px 0;font-family:monospace;font-size:11px;
    word-break:break-all;color:var(--gold);cursor:pointer;transition:.3s;text-align:center;
}
.dep-wallet:active{background:rgba(212,168,83,0.12)}
.dep-wallet small{display:block;color:var(--text3);font-family:'DM Sans';font-size:10px;margin-top:6px}
.dep-warn{
    padding:12px;border-radius:10px;font-size:11px;
    background:rgba(231,76,60,0.06);border:1px solid rgba(231,76,60,0.12);color:rgba(231,76,60,0.8);
}
.dep-ok{
    padding:12px;border-radius:10px;font-size:11px;margin-top:8px;
    background:rgba(46,204,113,0.06);border:1px solid rgba(46,204,113,0.1);color:var(--emerald);
}

/* ===== Success ===== */
.success{text-align:center;padding:40px 20px;animation:scale-in .5s ease}
.success-icon{font-size:60px;margin-bottom:14px;animation:success-bounce .6s ease}
.success-title{font-family:'Playfair Display';font-size:22px;font-weight:800;margin-bottom:6px}
.success-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:22px}

/* ===== Trust Section ===== */
.trust{display:flex;gap:10px;margin-bottom:16px}
.trust-item{
    flex:1;text-align:center;padding:14px 8px;border-radius:12px;
    background:var(--card);border:1px solid var(--card-border);
}
.trust-icon{font-size:22px;margin-bottom:6px}
.trust-txt{font-size:9px;color:var(--text2);font-weight:500;line-height:1.4}

/* ===== Toast ===== */
.toast{
    position:fixed;bottom:80px;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:rgba(212,168,83,0.95);color:#0b0e11;
    padding:10px 22px;border-radius:12px;font-size:13px;font-weight:600;
    z-index:200;transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 8px 30px rgba(212,168,83,0.3);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== Modal ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-box{
    background:var(--bg2);border:1px solid var(--card-border);border-radius:20px 20px 0 0;
    width:100%;max-width:460px;padding:20px 16px 36px;animation:fadeUp .3s ease;
}
.modal-bar{width:32px;height:3px;background:var(--text3);border-radius:2px;margin:0 auto 16px}
.lang-opt{
    display:flex;align-items:center;gap:12px;padding:13px 16px;
    border-radius:11px;border:none;background:none;cursor:pointer;width:100%;
    color:var(--text);font-size:14px;font-family:inherit;transition:.2s;margin-bottom:4px;
}
.lang-opt:active,.lang-opt.active{background:var(--glow);border:1px solid var(--card-border)}
.lang-flag{font-size:22px}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="mesh-bg"></div>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal" id="langModal">
    <div class="modal-box">
        <div class="modal-bar"></div>
        <button class="lang-opt" onclick="setLang('ckb')"><span class="lang-flag">🇮🇶</span> کوردی سۆرانی</button>
        <button class="lang-opt" onclick="setLang('en')"><span class="lang-flag">🇬🇧</span> English</button>
        <button class="lang-opt" onclick="setLang('ar')"><span class="lang-flag">🇸🇦</span> العربية</button>
    </div>
</div>

<script>
// ===== Particle Background =====
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
for(let i=0;i<40;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.3+.1});
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(212,168,83,${p.o})`;ctx.fill()});requestAnimationFrame(draw)}
draw();

// ===== Telegram =====
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#0b0e11');tg.setBackgroundColor('#0b0e11')}
const userId=tg?.initDataUnsafe?.user?.id||'demo';
const userName=tg?.initDataUnsafe?.user?.first_name||'User';

// ===== State =====
let S={
    lang:localStorage.getItem('cv_lang')||'en',page:'plans',
    plan:null,net:0,wallet:localStorage.getItem('cv_wallet')||'',
    bal:{invested:0,profit:0,withdrawn:0,available:0,referrals:0,refProfit:0},
    successMsg:''
};

// ===== Translations =====
const T={
ckb:{dir:'rtl',flag:'🇮🇶',name:'کوردی',
hero:'سەرمایەگوزاری زیرەکانە',sub:'سوودی ڕاستەقینە لە ئاربیتراژی کریپتۆ',
live:'ئاکتیڤ',plans:'پلانەکان',how:'چۆن؟',ref:'ناساندن',bal:'باڵانس',wd:'بەرداشت',
selPlan:'پلانێک هەڵبژێرە',selNet:'تۆڕ هەڵبژێرە',
walletLbl:'ناونیشانی جزدان',walletPh:'ناونیشانی جزدانی USDT',
invest:'سەرمایەگوزاری بکە',usdt:'تیتر',w:'هەفتانە',m:'مانگانە',
free:'بەرداشت ئازاد',noCondition:'بێ مەرج',
s1:'پلان هەڵبژێرە',s1d:'لە ٥٠ بۆ ١٠٠,٠٠٠ USDT',
s2:'واریزکردن',s2d:'USDT بنێرە بۆ ناونیشانی جزدان',
s3:'سوود وەربگرە',s3d:'سوودەکەت هەفتانە یان مانگانە',
s4:'بەرداشت',s4d:'هەر کاتێک ئازادانە بەرداشت بکە',
refT:'هاوڕێکانت بناسێنە',refD:'١٠٪ سوودی ناساندن',refN:'ناساندن ئیختیارییە',
refB:'پاداشت',link:'لینکی تۆ',copy:'کۆپی',copied:'کۆپی کرا!',
invested:'سەرمایە',profit:'سوود',withdrawn:'بەرداشتکراو',
avail:'بەردەست',referrals:'ناساندن',refE:'سوودی ناساندن',
wdAmt:'بڕی بەرداشت',wdBtn:'داواکاری بەرداشت',wdFree:'بەرداشت ئازاد — بێ مەرج',
depT:'واریزکردن',depW:'تەنها USDT بنێرە لەسەر',depOk:'ئەدمین پشتڕاست دەکاتەوە',
cpW:'کۆپی کرا!',amt:'بڕ',net:'تۆڕ',noW:'جزدانت بنووسە',
ok:'سەرکەوتوو!',depS:'تۆمارکرا. ئەدمین پشتڕاستی دەکاتەوە.',wdS:'داواکاری بەرداشتکردنت تۆمارکرا.',

},

const PLANS=[50,100,200,500,1000,2000,5000,10000,20000,50000,100000];
const NETS=[
{name:'TRC-20',chain:'TRON',color:'#FF0013',wallet:'YOUR_TRC20_WALLET_ADDRESS'},
{name:'ERC-20',chain:'Ethereum',color:'#627EEA',wallet:'YOUR_ERC20_WALLET_ADDRESS'},
{name:'BEP-20',chain:'BSC',color:'#F3BA2F',wallet:'0xa9d205143f5e6e533ee543a8995d2d3b34822e44'},
];

I_BASE='https://chute-subsiding-tassel.ngrok-free.dev';
const t=k=>T[S.lang]?.[k]||T.en[k]||k;
const fmt=n=>Number(n).toLocaleString();
const rtl=()=>T[S.lang]?.dir==='rtl';

function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}
function haptic(t='light'){tg?.HapticFeedback?.impactOccurred?.(t)}
function cp(text,msg){navigator.clipboard?.writeText(text).then(()=>{toast(msg||t('copied'));haptic('medium')})}

async function loadBal(){
    if(!userId||userId==='demo')return;
    try{const r=await fetch(`${API_BASE}/api/balance?user_id=${userId}`);const d=await r.json();
    if(d.ok){S.bal=d.balance;if(d.wallet)S.wallet=d.wallet;render()}}catch(e){console.log('API offline')}
}
async function sendAPI(action,data={}){
    const u=tg?.initDataUnsafe?.user;
    try{const r=await fetch(`${API_BASE}/api/${action}`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user_id:userId,username:u?.username||'',first_name:u?.first_name||'',...data})});
    const d=await r.json();if(d.ok)setTimeout(loadBal,1000);else if(d.error==='Insufficient balance')toast(`⚠️ ${t('avail')}: ${d.available} USDT`);
    return d}catch(e){toast('⚠️ Connection error');return{ok:false}}
}

// ===== RENDER =====
function render(){
    const a=document.getElementById('app');
    document.body.setAttribute('dir',rtl()?'rtl':'ltr');
    a.innerHTML=`${rHeader()}${rHero()}${rStats()}${rTrust()}${rPage()}${rNav()}`;
    bindEvents();
}
function rHeader(){return`<div class="header anim-1"><div class="logo"><div class="logo-mark">V</div><span class="logo-name">CryptoVault</span></div><button class="lang-btn" onclick="openLang()">${T[S.lang].flag} ${T[S.lang].name} <span style="font-size:9px;opacity:.4">▼</span></button></div>`}
function rHero(){return`<div class="hero anim-2"><div class="hero-badge"><span class="dot"></span>${t('live')}</div><h1>${t('hero')}</h1><p>${t('sub')}</p></div>`}
function rStats(){return`<div class="live-stats anim-3"><div class="live-stat"><div class="live-stat-val">${fmt(S.bal.invested)}</div><div class="live-stat-lbl">${t('invested')}</div></div><div class="live-stat"><div class="live-stat-val" style="color:var(--emerald)">${fmt(S.bal.profit)}</div><div class="live-stat-lbl">${t('profit')}</div></div><div class="live-stat"><div class="live-stat-val" style="color:var(--gold-light)">${S.bal.referrals}</div><div class="live-stat-lbl">${t('referrals')}</div></div></div>`}
function rTrust(){return`<div class="trust anim-4"><div class="trust-item"><div class="trust-icon">🛡️</div><div class="trust-txt">${t('t1')}<br>${t('t1d')}</div></div><div class="trust-item"><div class="trust-icon">⚡</div><div class="trust-txt">${t('t2')}<br>${t('t2d')}</div></div><div class="trust-item"><div class="trust-icon">🔓</div><div class="trust-txt">${t('t3')}<br>${t('t3d')}</div></div></div>`}
function rNav(){
    const tabs=[{id:'plans',i:'💎',l:t('plans')},{id:'how',i:'⚡',l:t('how')},{id:'ref',i:'🤝',l:t('ref')},{id:'bal',i:'💰',l:t('bal')},{id:'wd',i:'📤',l:t('wd')}];
    return`<div class="bottom-nav">${tabs.map(x=>`<button class="bnav ${S.page===x.id?'active':''}" data-tab="${x.id}"><span class="bnav-icon">${x.i}</span><span class="bnav-label">${x.l}</span></button>`).join('')}</div>`;
}
function rPage(){
    const P={plans:pgPlans,how:pgHow,ref:pgRef,bal:pgBal,wd:pgWd,dep:pgDep,ok:pgOk};
    return`<div class="anim-5">${(P[S.page]||pgPlans)()}</div>`;
}

// Pages
function pgPlans(){
    return`<div style="font-size:14px;font-weight:600;margin-bottom:10px">${t('selPlan')}</div>
    <div class="plans-grid">${PLANS.map(p=>`<div class="card plan ${S.plan===p?'sel':''}" data-p="${p}"><div class="plan-check">✓</div><div class="plan-amt">${fmt(p)}</div><div class="plan-cur">${t('usdt')}</div></div>`).join('')}</div>
    ${S.plan?`<div class="card invest-form" style="animation:scale-in .3s ease">
    <div class="profit-row"><span class="profit-tag weekly">📈 ${t('w')}: ~25%</span><span class="profit-tag monthly">🚀 ${t('m')}: ~100%</span><span class="profit-tag free">✅ ${t('free')}</span></div>
    <label class="field-label">${t('selNet')}</label>
    <div class="nets">${NETS.map((n,i)=>`<button class="net ${S.net===i?'active':''}" data-n="${i}"><span class="net-dot" style="background:${n.color}"></span><span class="net-name">${n.name}</span><span class="net-chain">${n.chain}</span></button>`).join('')}</div>
    <label class="field-label">${t('walletLbl')}</label>
    <input class="field" id="wIn" dir="ltr" placeholder="${t('walletPh')}" value="${S.wallet}">
    <button class="btn btn-gold" id="investBtn">${t('invest')} — ${fmt(S.plan)} USDT</button>
    </div>`:''}`
}
function pgHow(){
    const steps=[{n:'1',t:t('s1'),d:t('s1d'),i:'💎'},{n:'2',t:t('s2'),d:t('s2d'),i:'📤'},{n:'3',t:t('s3'),d:t('s3d'),i:'📈'},{n:'4',t:t('s4'),d:t('s4d'),i:'💰'}];
    return steps.map((s,i)=>`<div class="card" style="animation:fadeUp ${.3+i*.1}s ease both"><div class="step"><div class="step-n">${s.n}</div><div><div class="step-t">${s.t} ${s.i}</div><div class="step-d">${s.d}</div></div></div></div>`).join('')+
    `<div class="card" style="padding:14px;text-align:center;border-color:rgba(46,204,113,0.2)"><span style="font-size:12px;color:var(--emerald)">✅ ${t('wdFree')}</span></div>`;
}
function pgRef(){
    const link=`https://t.me/kurdcryptoz_bot?start=ref_${userId}`;
    return`<div class="card"><div class="ref-hero"><div class="ref-icon">🤝</div><h2 style="font-family:'Playfair Display';font-size:19px;font-weight:700;margin-bottom:6px">${t('refT')}</h2><p style="font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:16px">${t('refD')}</p><div class="ref-pct">10%</div><div style="font-size:11px;color:var(--text3);margin:4px 0 14px">${t('refB')}</div><div style="padding:5px 14px;border-radius:16px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.12);display:inline-block;font-size:10px;color:var(--emerald)">🔓 ${t('refN')}</div></div><div class="ref-link-box"><input class="ref-link" value="${link}" readonly dir="ltr"><button class="copy-btn" onclick="cp('${link}','${t('copied')}')">${t('copy')}</button></div></div>
    <div class="card" style="padding:16px"><div class="bal-grid" style="padding:0"><div class="bal-item"><div class="bal-item-v" style="color:var(--gold)">${S.bal.referrals}</div><div class="bal-item-l">${t('referrals')}</div></div><div class="bal-item"><div class="bal-item-v" style="color:var(--emerald)">${fmt(S.bal.refProfit)}</div><div class="bal-item-l">${t('refE')}</div></div></div></div>`
}
function pgBal(){
    return`<div class="card"><div class="bal-main"><div class="bal-lbl">${t('avail')}</div><div class="bal-amt">${fmt(S.bal.available)} <span style="font-size:14px;color:var(--text3)">USDT</span></div></div><div class="bal-grid"><div class="bal-item"><div class="bal-item-v" style="color:var(--gold)">${fmt(S.bal.invested)}</div><div class="bal-item-l">${t('invested')}</div></div><div class="bal-item"><div class="bal-item-v" style="color:var(--emerald)">${fmt(S.bal.profit)}</div><div class="bal-item-l">${t('profit')}</div></div><div class="bal-item"><div class="bal-item-v" style="color:var(--danger)">${fmt(S.bal.withdrawn)}</div><div class="bal-item-l">${t('withdrawn')}</div></div><div class="bal-item"><div class="bal-item-v" style="color:var(--gold-light)">${fmt(S.bal.refProfit)}</div><div class="bal-item-l">${t('refE')}</div></div></div></div>`
}
function pgWd(){
    return`<div class="card"><div class="wd-section"><div class="wd-avail">💵 ${t('avail')}: ${fmt(S.bal.available)} USDT</div><label class="field-label">${t('wdAmt')}</label><input class="field" id="wdIn" type="number" dir="ltr" placeholder="0.00" min="1"><label class="field-label">${t('walletLbl')}</label><input class="field" id="wdW" dir="ltr" placeholder="${t('walletPh')}" value="${S.wallet}"><button class="btn btn-gold" id="wdBtn">${t('wdBtn')}</button><div class="wd-free">✅ ${t('wdFree')}</div></div></div>`
}
function pgDep(){
    const n=NETS[S.net];
    return`<div class="card dep-info"><h3 style="font-family:'Playfair Display';font-size:18px;font-weight:700;margin-bottom:14px">📤 ${t('depT')}</h3><div class="dep-row"><span class="dep-k">${t('amt')}</span><span class="dep-v">${fmt(S.plan)} USDT</span></div><div class="dep-row"><span class="dep-k">${t('net')}</span><span class="dep-v" style="color:${n.color}">${n.name}</span></div><div class="dep-wallet" onclick="cp('${n.wallet}','${t('cpW')}')">${n.wallet}<small>📋 ${t('copy')}</small></div><div class="dep-warn">⚠️ ${t('depW')} ${n.name}</div><div class="dep-ok">✅ ${t('depOk')}</div><button class="btn btn-outline" style="margin-top:14px" onclick="S.page='plans';render()">← ${t('plans')}</button></div>`
}
function pgOk(){
    return`<div class="card"><div class="success"><div class="success-icon">✅</div><div class="success-title">${t('ok')}</div><div class="success-msg">${S.successMsg}</div><button class="btn btn-gold" style="max-width:180px;margin:0 auto" onclick="S.page='plans';render()">${t('plans')}</button></div></div>`
}

function bindEvents(){
    document.querySelectorAll('.bnav').forEach(b=>b.addEventListener('click',()=>{S.page=b.dataset.tab;haptic();render()}));
    document.querySelectorAll('.plan').forEach(c=>c.addEventListener('click',()=>{S.plan=parseInt(c.dataset.p);haptic();render()}));
    document.querySelectorAll('.net').forEach(c=>c.addEventListener('click',()=>{S.net=parseInt(c.dataset.n);haptic();render()}));
    const ib=document.getElementById('investBtn');
    if(ib)ib.addEventListener('click',async()=>{
        const w=document.getElementById('wIn').value.trim();
        if(w.length<20){toast(t('noW'));return}
        S.wallet=w;localStorage.setItem('cv_wallet',w);haptic('heavy');
        await sendAPI('invest',{plan:S.plan,network:NETS[S.net].name,wallet:w});
        S.page='dep';render();
    });
    const wb=document.getElementById('wdBtn');
    if(wb)wb.addEventListener('click',async()=>{
        const amt=parseFloat(document.getElementById('wdIn')?.value);
        const w=document.getElementById('wdW')?.value.trim();
        if(!amt||amt<=0){toast('⚠️');return}
        if(!w||w.length<20){toast(t('noW'));return}
        S.wallet=w;localStorage.setItem('cv_wallet',w);haptic('heavy');
        const r=await sendAPI('withdraw',{amount:amt,wallet:w});
        if(r.ok){S.successMsg=t('wdS');S.page='ok';render()}
    });
}
function openLang(){document.getElementById('langModal').classList.add('open');haptic()}
function setLang(l){S.lang=l;localStorage.setItem('cv_lang',l);document.getElementById('langModal').classList.remove('open');haptic('medium');render()}
document.getElementById('langModal').addEventListener('click',e=>{if(e.target.id==='langModal')e.target.classList.remove('open')});
render();loadBal();
</script>
</body>
</html>
