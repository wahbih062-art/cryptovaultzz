<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoVault</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08080d;
            --bg-secondary: #0f0f18;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --border-active: rgba(168, 130, 255, 0.5);
            --text-primary: #e8e8ec;
            --text-secondary: rgba(255,255,255,0.45);
            --text-muted: rgba(255,255,255,0.25);
            --accent: #a882ff;
            --accent-dark: #7c5ce0;
            --accent-glow: rgba(168, 130, 255, 0.15);
            --success: #6fdc8c;
            --success-bg: rgba(80, 200, 120, 0.1);
            --danger: #ff6b8a;
            --warning: #f3ba2f;
            --tron: #FF0013;
            --ethereum: #627EEA;
            --bsc: #F3BA2F;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', 'Noto Sans Arabic', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* === Background Effects === */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite alternate;
        }
        .bg-orb-1 { width: 300px; height: 300px; top: -80px; left: -80px; background: rgba(168,130,255,0.12); }
        .bg-orb-2 { width: 250px; height: 250px; top: 50%; right: -60px; background: rgba(100,60,200,0.1); animation-delay: 2s; }
        .bg-orb-3 { width: 200px; height: 200px; bottom: -50px; left: 20%; background: rgba(255,107,138,0.08); animation-delay: 4s; }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: 
                linear-gradient(rgba(168,130,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168,130,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(20px, -20px) scale(1.15); opacity: 0.8; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px rgba(168,130,255,0.3); }
        }
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes successPop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* === Layout === */
        .app-container {
            position: relative; z-index: 1;
            max-width: 480px; margin: 0 auto;
            padding: 0 16px 100px;
        }

        /* === Header === */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0;
            animation: fadeIn 0.5s ease;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: white;
        }
        .logo-text {
            font-size: 18px; font-weight: 800;
            letter-spacing: -0.5px;
        }
        .lang-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .lang-btn:active { transform: scale(0.96); }

        /* === Hero === */
        .hero {
            text-align: center;
            padding: 20px 0 28px;
            animation: slideUp 0.6s ease;
        }
        .hero h1 {
            font-size: 32px; font-weight: 900;
            line-height: 1.15;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--danger) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 5s linear infinite;
            margin-bottom: 8px;
        }
        .hero p {
            font-size: 14px; color: var(--text-secondary);
            font-weight: 300;
        }

        /* === Stats Row === */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 24px;
            animation: slideUp 0.7s ease;
        }
        .stat-mini {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .stat-mini .stat-value {
            font-size: 15px; font-weight: 800;
            animation: countUp 0.6s ease forwards;
        }
        .stat-mini .stat-label {
            font-size: 10px; color: var(--text-muted);
            margin-top: 4px; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* === Navigation Tabs === */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(8, 8, 13, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 4px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        .bottom-nav-item {
            background: none; border: none;
            color: var(--text-muted);
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            padding: 6px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            flex: 1;
            min-width: 0;
        }
        .bottom-nav-item.active {
            color: var(--accent);
            background: var(--accent-glow);
        }
        .bottom-nav-icon { font-size: 18px; }
        .bottom-nav-label {
            font-size: 9px; font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .bottom-nav-item:active { transform: scale(0.92); }
        .bottom-nav-item.active {
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* === Cards === */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        /* === Plans Grid === */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .plan-card {
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .plan-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .plan-card.selected {
            border-color: var(--border-active);
            background: linear-gradient(135deg, rgba(168,130,255,0.08), rgba(100,80,200,0.03));
        }
        .plan-card.selected::before { opacity: 1; }
        .plan-card:active { transform: scale(0.97); }
        .plan-amount {
            font-size: 20px; font-weight: 800;
            margin-bottom: 2px;
        }
        .plan-label {
            font-size: 10px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .plan-check {
            position: absolute; top: 8px; right: 8px;
            width: 20px; height: 20px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: none; align-items: center; justify-content: center;
            font-size: 11px; color: white;
        }
        .plan-card.selected .plan-check { display: flex; }

        /* === Network Chips === */
        .networks {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .network-chip {
            flex: 1;
            padding: 12px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: inherit;
        }
        .network-chip.active {
            border-color: var(--border-active);
            background: var(--accent-glow);
        }
        .network-chip:active { transform: scale(0.96); }
        .network-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .network-name {
            font-weight: 600; font-size: 13px;
            display: block; margin-top: 4px;
        }
        .network-chain {
            font-size: 10px; color: var(--text-muted);
        }

        /* === Input === */
        .input-group { margin-bottom: 16px; }
        .input-label {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 8px; display: block;
        }
        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Outfit', monospace;
            outline: none;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .input-field::placeholder { color: var(--text-muted); }

        /* === Buttons === */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            color: white;
            padding: 15px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        /* === Steps === */
        .step-item {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 20px;
        }
        .step-num {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
            flex-shrink: 0;
        }
        .step-content { flex: 1; }
        .step-title {
            font-size: 15px; font-weight: 600;
            margin-bottom: 4px;
        }
        .step-desc {
            font-size: 13px; color: var(--text-secondary);
            line-height: 1.5;
        }

        /* === Referral === */
        .referral-hero {
            text-align: center; padding: 28px 20px;
        }
        .referral-icon {
            font-size: 48px;
            margin-bottom: 14px;
            animation: orbFloat 3s ease-in-out infinite alternate;
            display: inline-block;
        }
        .referral-percent {
            font-size: 36px; font-weight: 900;
            color: #c9b3ff;
        }
        .referral-link-box {
            display: flex; gap: 8px;
            padding: 0 20px 20px;
        }
        .referral-link-input {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 11px;
            font-family: monospace;
            outline: none;
        }
        .copy-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none; color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }
        .copy-btn:active { transform: scale(0.96); }

        /* === Balance === */
        .balance-card {
            padding: 24px;
        }
        .balance-main {
            text-align: center;
            margin-bottom: 20px;
        }
        .balance-label {
            font-size: 12px; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .balance-amount {
            font-size: 36px; font-weight: 900;
            color: var(--success);
            margin: 4px 0;
        }
        .balance-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .balance-item {
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .balance-item-value {
            font-size: 16px; font-weight: 700;
        }
        .balance-item-label {
            font-size: 11px; color: var(--text-muted);
            margin-top: 4px;
        }

        /* === Withdraw === */
        .withdraw-section { padding: 20px; }
        .available-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--success-bg);
            border: 1px solid rgba(80,200,120,0.2);
            color: var(--success);
            font-size: 13px; font-weight: 600;
            margin-bottom: 16px;
        }

        /* === Deposit Instructions === */
        .deposit-info { padding: 24px; }
        .deposit-wallet {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s;
        }
        .deposit-wallet:active {
            background: var(--accent-glow);
        }
        .deposit-warning {
            background: rgba(255,107,138,0.08);
            border: 1px solid rgba(255,107,138,0.15);
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            color: rgba(255,107,138,0.8);
            margin-top: 12px;
        }

        /* === Toast === */
        .toast {
            position: fixed;
            bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20,20,30,0.95);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 24px;
            color: var(--text-primary);
            font-size: 14px;
            z-index: 1000;
            backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* === Language Modal === */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            display: none;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            width: 100%; max-width: 480px;
            padding: 24px 16px 40px;
            animation: slideUp 0.3s ease;
        }
        .modal-title {
            font-size: 16px; font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
        }
        .modal-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .lang-option {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 4px;
        }
        .lang-option:active,
        .lang-option.active {
            background: var(--accent-glow);
            border-color: var(--border-active);
        }
        .lang-flag { font-size: 24px; }

        /* === Success Screen === */
        .success-screen {
            text-align: center;
            padding: 40px 20px;
            animation: successPop 0.5s ease;
        }
        .success-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .success-title {
            font-size: 22px; font-weight: 800;
            margin-bottom: 8px;
        }
        .success-msg {
            font-size: 14px; color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* === Badge === */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-accent { background: var(--accent-glow); color: #c9b3ff; }
        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-danger { background: rgba(255,107,138,0.1); color: #ff8fa8; }

        /* === History === */
        .history-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        .history-item:last-child { border-bottom: none; }
        .history-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .history-details { flex: 1; }
        .history-action { font-size: 13px; font-weight: 600; }
        .history-date { font-size: 11px; color: var(--text-muted); }
        .history-amount {
            font-size: 14px; font-weight: 700;
            text-align: right;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        /* === Profit Badges === */
        .profit-badges {
            display: flex; gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        /* === Page transition === */
        .page { animation: slideUp 0.4s ease; }

        /* === RTL Support === */
        [dir="rtl"] {
            font-family: 'Noto Sans Arabic', 'Outfit', sans-serif;
        }
        [dir="rtl"] .plan-check { right: auto; left: 8px; }
        [dir="rtl"] .network-dot { margin-right: 0; margin-left: 6px; }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 0; }

        /* Fix iOS momentum scrolling */
        body { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>

    <div class="app-container" id="app"></div>
    <div class="toast" id="toast"></div>

    <!-- Language Modal -->
    <div class="modal-overlay" id="langModal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="modal-title" id="langModalTitle">🌐 Select Language</div>
            <button class="lang-option" onclick="setLang('ckb')">
                <span class="lang-flag">🇮🇶</span> کوردی سۆرانی
            </button>
            <button class="lang-option" onclick="setLang('en')">
                <span class="lang-flag">🇬🇧</span> English
            </button>
            <button class="lang-option" onclick="setLang('ar')">
                <span class="lang-flag">🇸🇦</span> العربية
            </button>
        </div>
    </div>

    <script>
    // ============================================================
    // TELEGRAM WEB APP INTEGRATION
    // ============================================================
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#08080d');
        tg.setBackgroundColor('#08080d');
    }

    const userId = tg?.initDataUnsafe?.user?.id || 'demo';
    const userName = tg?.initDataUnsafe?.user?.first_name || 'User';
    const startParam = tg?.initDataUnsafe?.start_param || '';

    // ============================================================
    // STATE
    // ============================================================
    let state = {
        lang: localStorage.getItem('cv_lang') || 'en',
        currentPage: 'plans',
        selectedPlan: null,
        selectedNetwork: 0,
        walletAddress: localStorage.getItem('cv_wallet') || '',
        balance: { invested: 0, profit: 0, withdrawn: 0, available: 0, referrals: 0, refProfit: 0 },
        history: [],
        depositShown: false,
    };

    // ============================================================
    // TRANSLATIONS
    // ============================================================
    const T = {
        ckb: {
            dir: 'rtl', flag: '🇮🇶', name: 'کوردی',
            hero: 'سەرمایەگوزاری زیرەکانە', heroSub: 'سوودی ڕاستەقینە لە ئاربیتراژی کریپتۆ',
            monthly: 'مانگانە', weekly: 'هەفتانە', profit: 'سوود',

    // ============================================================
    // API COMMUNICATION — sends notification to admin via Bot API
    // ============================================================
    
    // ⚠️ توکن ربات و آیدی ادمین رو اینجا بذار
    const BOT_TOKEN = 'YOUR_BOT_TOKEN_HERE';
    const ADMIN_CHAT_ID = 'YOUR_ADMIN_ID_HERE';

    async function sendToBot(action, data = {}) {
        const user = tg?.initDataUnsafe?.user;
        const userInfo = user 
            ? `${user.first_name || ''} (@${user.username || 'N/A'}) | ID: ${user.id}`
            : `Demo User | ID: ${userId}`;

        let message = '';
        
        if (action === 'invest') {
            message = `🔔 *New Deposit Request*\n\n` +
                `👤 ${userInfo}\n` +
                `💰 *${Number(data.plan).toLocaleString()} USDT*\n` +
                `🔗 Network: ${data.network}\n` +
                `👛 Wallet: \`${data.wallet}\`\n` +
                `📅 ${new Date().toLocaleString()}`;
        } else if (action === 'withdraw') {
            message = `📤 *Withdrawal Request*\n\n` +
                `👤 ${userInfo}\n` +
                `💰 *${Number(data.amount).toLocaleString()} USDT*\n` +
                `👛 Wallet: \`${data.wallet}\`\n` +
                `📅 ${new Date().toLocaleString()}`;
        }

        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            const result = await res.json();
            if (result.ok) {
                console.log('✅ Admin notified');
            } else {
                console.error('❌ Bot API error:', result);
            }
        } catch (err) {
            console.error('❌ Network error:', err);
        }
    }

    // ============================================================
    function attachEvents() {
        // Tab clicks
        document.querySelectorAll('.bottom-nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                state.currentPage = btn.dataset.tab;
                haptic();
                render();
            });
        });

        // Plan selection
        document.querySelectorAll('.plan-card').forEach(card => {
            card.addEventListener('click', () => {
                state.selectedPlan = parseInt(card.dataset.plan);
                haptic();
                render();
            });
        });

        // Network selection
        document.querySelectorAll('.network-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                state.selectedNetwork = parseInt(chip.dataset.network);
                haptic();
                render();
            });
        });

        // Invest button
        const investBtn = document.getElementById('investBtn');
        if (investBtn) {
            investBtn.addEventListener('click', () => {
                const wallet = document.getElementById('walletInput').value.trim();
                if (wallet.length < 20) {
                    showToast(t('noWallet'));
                    return;
                }
                state.walletAddress = wallet;
                localStorage.setItem('cv_wallet', wallet);

                // Send data to bot
                sendToBot('invest', {
                    plan: state.selectedPlan,
                    network: NETWORKS[state.selectedNetwork].name,
                    wallet: wallet,
                });

                haptic('heavy');
                state.currentPage = 'deposit';
                render();
            });
        }

        // Withdraw button
        const withdrawBtn = document.getElementById('withdrawBtn');
        if (withdrawBtn) {
            withdrawBtn.addEventListener('click', () => {
                const amount = parseFloat(document.getElementById('withdrawInput')?.value);
                const wallet = document.getElementById('withdrawWallet')?.value.trim();

                if (!amount || amount <= 0) {
                    showToast('⚠️ Invalid amount');
                    return;
                }
                if (amount > state.balance.available) {
                    showToast('⚠️ Insufficient balance');
                    return;
                }
                if (!wallet || wallet.length < 20) {
                    showToast(t('noWallet'));
                    return;
                }

                state.walletAddress = wallet;
                localStorage.setItem('cv_wallet', wallet);

                sendToBot('withdraw', { amount, wallet });

                haptic('heavy');
                state.successMsg = t('withdrawSent');
                state.currentPage = 'success';
                render();
            });
        }
    }

    // ============================================================
    // LANGUAGE
    // ============================================================
    function openLangModal() {
        document.getElementById('langModal').classList.add('open');
        haptic();
    }

    function setLang(lang) {
        state.lang = lang;
        localStorage.setItem('cv_lang', lang);
        document.getElementById('langModal').classList.remove('open');
        haptic('medium');
        render();
    }

    // Close modal on overlay click
    document.getElementById('langModal').addEventListener('click', (e) => {
        if (e.target.id === 'langModal') {
            e.target.classList.remove('open');
        }
    });

    // ============================================================
    // INIT
    // ============================================================
    render();
    </script>
</body>
</html>
